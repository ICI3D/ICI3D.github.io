bio: Belinda is a PhD student in Applied Mathematics at the University of Birmingham, where her research focuses on mathematical modelling of cortisol dynamics and the HPA axis. She holds an MSc in Applied Mathematics from Stellenbosch University, where she worked on simulation-based validation of a model for detecting changes in SARS-CoV-2 reinfection risk. Her broader interests include infectious disease modelling, data-driven mathematical modelling, and computational approaches to biological systems.
