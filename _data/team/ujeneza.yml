bio: Eva Liliane Ujeneza is a mathematician and epidemiological modeller whose work focuses on applying mathematical and statistical methods to infectious diseases, climate-health interactions, and epidemic preparedness. She is a Research Fellow in Mathematical Epidemiology and Coordinator of the Epidemic Response Lab (ERL) at the African Institute for Mathematical Sciences (AIMS) Research and Innovation Centre in Kigali, Rwanda. Her research includes modeling immune system reconstitution in HIV-infected patients receiving antiretroviral therapy, COVID-19 transmission and intervention strategies, climate-sensitive disease dynamics, and, more recently, Mpox transmission and control in the Democratic Republic of Congo. She currently contributes to MRC- and Gates Foundation-funded Mpox projects implemented in collaboration with the South Kivu Provincial Health Division. Eva has been actively involved in the MMED and DAIDD communities for over a decade, first as a participant, later as a mentor, and subsequently as faculty. She has contributed to the design and delivery of training in infectious disease modelling, epidemiology, data analysis, and scientific programming, both in person and through online learning initiatives. Beyond research, she coordinates MSc internship programs in Mathematical Epidemiology and Malaria Modelling, mentors early-career African scientists, and supports capacity building in quantitative public health across the continent.
