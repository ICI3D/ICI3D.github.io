bio: Reshma is a Senior Research Officer at the Centre for Integrated Data and Epidemiological Research (CIDER) in the School of Public Health at the University of Cape Town. She has previously worked as a statistical consultant, as well as a statistical researcher at the South African Centre for Epidemiological Modelling and Analysis (SACEMA) at Stellenbosch University, where her work focused on methods for estimating HIV incidence. Her training spans statistics and computational and applied mathematics. In her current role, she works as a biostatistician within the International epidemiology Databases to Evaluate AIDS (<a href="https://www.iedea.org/" target="_blank">IeDEA</a>) collaboration, contributing to the analysis of large-scale observational HIV data to support public health decision-making.

