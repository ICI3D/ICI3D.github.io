bio: Shad&eacute is a Fellowship Manager at SACEMA, where she manages the measles and polio SACEMA Policy Modelling Fellowship. The Fellowship builds capacity for practical, data-driven modelling among people working within, or closely with, African Ministries of Health. Working as part of the fellowship team, Shad&eacute's role encompasses technical training, mentorship, and coordination of the fellowship. She plays a central part in guiding fellows through their fellowship year and helping them build the skills needed to translate complex models into actionable public health insights. Shad&eacute holds a PhD in Biochemistry from Stellenbosch University, with a specialisation in Computational Systems Biology. Her doctoral research focused on the linking and analysis of multi-scale models describing the within-host disease dynamics and the whole-body glucose metabolism of a malaria infected patient.
