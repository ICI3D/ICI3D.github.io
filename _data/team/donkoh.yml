bio: Vincent Donkoh is a PhD Candidate in Scientific Computing and Industrial Modelling at the National Institute for Mathematical Sciences, Kwame Nkrumah University of Science and Technology (KNUST), and affiliated with the German-West African Centre for Global Health and Pandemic Prevention (G-WAC). His research focuses on mathematical modelling, scientific computing, optimization, and data-driven systems for real-world applications in education and public health. He holds an MPhil in Applied Mathematics (2019) and a BSc in Mathematics (2016) from KNUST. Vincent has contributed to interdisciplinary projects involving infectious disease modelling, pandemic preparedness, automated timetabling systems, and scalable digital learning platforms. Beyond research, he works at the intersection of software engineering and learning technologies, with experience designing large-scale digital systems supporting learners and institutions across multiple countries.
